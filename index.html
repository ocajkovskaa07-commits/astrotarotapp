<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zlata Tarot Astral</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            background: #030306; color: #f4f4f6; font-family: 'Cinzel', serif;
            min-height: 100vh; margin: 0; padding: 15px; overflow-x: hidden; position: relative;
        }
        #space-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        h1 {
            font-size: 24px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #fff2b2, #ffbb00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; margin: 10px 0 15px;
        }

        .magic-zone { position: relative; width: 100%; max-width: 360px; height: 280px; margin: 20px auto; transition: all 0.6s ease; }
        .magic-zone.minimized { transform: scale(0.58) translateY(-45px); height: 190px; }

        .cards-container { position: relative; width: 100%; height: 100%; }

        .interactive-card {
            position: absolute; width: 92px; height: 155px; cursor: grab;
            perspective: 1400px; transition: all 0.4s ease; touch-action: none;
        }
        .interactive-card .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.85s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .interactive-card.flipped .card-inner { transform: rotateY(180deg); }
        .interactive-card.inverted .card-inner { transform: rotateY(180deg) rotateZ(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border: 2px solid #ffd700; border-radius: 12px; overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.85), 0 0 30px rgba(255,215,0,0.5);
        }
        .card-back { background: linear-gradient(135deg, #0f1126, #1b1f4d, #0a0b1a); }
        .card-back::before {
            content: "✦ ZLATA TAROT ✦"; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #ffd700; font-size: 14px; letter-spacing: 3px;
        }

        .card-front {
            background: #f8f0d8; transform: rotateY(180deg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px; text-align: center; color: #2c1a0f;
        }
        .card-front img { width: 72px; height: 100px; object-fit: contain; border-radius: 6px; margin-bottom: 6px; }

        #status-text { font-size: 15.5px; color: #fff2b2; text-align: center; margin: 15px 0; text-shadow: 0 0 10px #ffbb00; }
        #meanings { margin-top: 20px; }
        .meaning-card {
            background: rgba(30,25,50,0.95); border: 1px solid #d4af37;
            border-radius: 12px; padding: 15px; margin: 12px 0; text-align: left;
        }
        .gold-btn, .back-btn {
            background: linear-gradient(135deg, #fff4cc, #ffd700, #cc9900);
            color: #050508; font-weight: 700; padding: 18px 50px; border: none;
            border-radius: 50px; font-size: 15px; box-shadow: 0 0 30px rgba(255,215,0,0.6);
            cursor: pointer;
        }
        .back-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff2b2; padding: 10px 20px; }
    </style>
</head>

        // Фоновая музыка
        function playBackgroundMusic() {
            bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.23;
            bgMusic.play().catch(() => {});
        }

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playFlipSound() {
            if (!audioContext) return;
            const osc = audioContext.createOscillator();
            osc.frequency.value = 420;
            const gain = audioContext.createGain();
            gain.gain.value = 0.25;
            osc.connect(gain).connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + 0.28);
        }

        function createSparkles(el) {
            for (let i = 0; i < 22; i++) {
                setTimeout(() => {
                    const s = document.createElement('div');
                    s.style.cssText = `position:absolute;width:7px;height:7px;background:#ffeb3b;border-radius:50%;left:${Math.random()*90+5}%;top:${Math.random()*90+5}%;`;
                    el.appendChild(s);
                    setTimeout(() => s.remove(), 800);
                }, i * 22);
            }
        }

        // Drag & Drop
        function makeDraggable(card) {
            let isDragging = false, startX, startY;

            card.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX; startY = e.clientY; });
            card.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; });

            const move = (e) => {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                card.style.left = (card.offsetLeft + (clientX - startX)) + 'px';
                card.style.top = (card.offsetTop + (clientY - startY)) + 'px';
                startX = clientX; startY = clientY;
            };

            document.addEventListener('mousemove', move);
            document.addEventListener('touchmove', move);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('touchend', () => isDragging = false);
        }

        function flipCard(card) {
            if (card.classList.contains('flipped')) return;

            const cardData = JSON.parse(card.dataset.info);
            const isReversed = Math.random() > 0.55;

            if (isReversed) card.classList.add('inverted');
            card.classList.add('flipped');
            card.style.zIndex = 100 + flippedCount;
            card.style.transform += ' translateY(-35px) scale(1.12)';

            playFlipSound();
            createSparkles(card);

            flippedCount++;
            selectedCards.push({...cardData, reversed: isReversed});

            if (flippedCount === targetCardsCount) {
                document.getElementById('status-text').innerText = "✦ Расклад готов! ✦";
                setTimeout(showMeanings, 1100);
            } else {
                document.getElementById('status-text').innerText = `Выбрано: ${flippedCount} из ${targetCardsCount}`;
            }
        }

        function showMeanings() {
            const container = document.getElementById('meanings');
            container.innerHTML = `<h3 style="color:#ffd700;">Толкование расклада</h3>`;
            selectedCards.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'meaning-card';
                div.innerHTML = `<strong>${i+1}. ${c.name} ${c.reversed ? '(Перевёрнутая)' : ''}</strong><br><span>${c.reversed ? c.reversed : c.upright}</span>`;
                container.appendChild(div);
            });
            container.style.display = 'block';
        }

        function startLayout(action, count) {
            currentAction = action;
            targetCardsCount = count;
            flippedCount = 0;
            selectedCards = [];

            document.getElementById('menu-stage').style.display = 'none';
            document.getElementById('magic-zone').classList.remove('minimized');
            document.getElementById('game-stage').style.display = 'flex';
            document.getElementById('meanings').style.display = 'none';
            document.getElementById('status-text').style.display = 'block';
            document.getElementById('status-text').innerText = `Выберите ${count} карт...`;

            buildDeck(count);
        }

        function buildDeck(count) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            for (let i = 0; i < count; i++) {
                const cardData = tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
                const card = document.createElement('div');
                card.className = 'interactive-card';
                card.dataset.info = JSON.stringify(cardData);

                const offset = (i - (count-1)/2) * (count > 6 ? 22 : 37);
                const rot = (i - (count-1)/2) * (count > 6 ? 3.5 : 9);

                card.style.transform = `translateX(${offset}px) rotate(${rot}deg)`;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <img src="${cardData.img}" alt="${cardData.name}">
                            <div style="font-size:11px;">${cardData.name}</div>
                        </div>
                    </div>
                `;

                makeDraggable(card);
                card.addEventListener('click', () => flipCard(card));
                container.appendChild(card);
            }
        }

        function sendPaymentRequest(product) {
            tg.sendData(JSON.stringify({ action: "request_payment", product }));
        }

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('magic-zone').classList.add('minimized');
            document.getElementById('menu-stage').style.display = 'flex';
        }

        function backToMenu() {
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('magic-zone').classList.add('minimized');
            document.getElementById('menu-stage').style.display = 'flex';
        }

        window.onload = () => {
            initAudio();
            playBackgroundMusic();
            backToMenu(); // начальный веер
        };
    </script>
</body>
</html>
