        .card-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', resizeElements);

        // Обработка кнопок навигации Telegram
        tg.onEvent('backButtonClicked', () => {
            closeCardModal();
            tg.BackButton.hide();
        });

        // Блокировка контекстного меню
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        // Дополнительные служебные функции
        function clearSpread() {
            const spread = document.querySelector('.spread-result');
            if (spread) spread.remove();
        }

        // Инициализация кэширования
        const cache = new Map();
        function preloadImages() {
            cards.forEach(c => {
                const img = new Image();
                img.src = c.img;
                cache.set(c.id, img);
            });
        }
        preloadImages();
        
        // Завершение БЛОКА 5
        console.log("Interface and Asset Management Loaded");

// Получение данных пользователя из WebApp
function getUserProfile() {
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        return tg.initDataUnsafe.user;
    }
    return { first_name: "Гость" };
}

// Приветствие пользователя
function greetUser() {
    const user = getUserProfile();
    const welcome = document.createElement('div');
    welcome.style.textAlign = 'center';
    welcome.style.marginBottom = '20px';
    welcome.innerText = `Привет, ${user.first_name}! Готова к предсказанию?`;
    document.querySelector('.main-container').prepend(welcome);
}

// Отправка данных о раскладе в бота (через WebApp Cloud Storage)
async function sendResultToBot(result) {
    if (tg.CloudStorage) {
        try {
            await tg.CloudStorage.setItem('last_spread', JSON.stringify(result));
            logger.log("Результат сохранен в облаке");
        } catch (e) {
            logger.error("Ошибка сохранения в облако");
        }
    }
}

// Функция для выбора темы (смена цветов)
function setAppTheme(theme) {
    const body = document.body;
    if (theme === 'dark') {
        body.style.background = '#030306';
        body.style.color = '#f4f4f6';
    } else {
        body.style.background = '#ffffff';
        body.style.color = '#000000';
    }
}

// Проверка ориентации устройства
function checkOrientation() {
    if (window.innerHeight < window.innerWidth) {
        console.warn("Пожалуйста, переверните устройство в портретный режим");
    }
}
window.addEventListener('orientationchange', checkOrientation);

// Управление вибрацией (haptic) в зависимости от действий
function triggerHaptic(type) {
    if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred(type); // 'light', 'medium', 'heavy'
    }
}

// Обработка нажатий на кнопки в модальных окнах
document.querySelectorAll('.btn-mystic').forEach(btn => {
    btn.addEventListener('pointerdown', (e) => {
        triggerHaptic('light');
    });
});

// Служебная функция для генерации случайного числа в диапазоне
function getRandomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Функция для сброса всех состояний
function resetAll() {
    clearSpread();
    closeCardModal();
    console.log("Состояние приложения сброшено");
}

window.addEventListener('DOMContentLoaded', () => {
