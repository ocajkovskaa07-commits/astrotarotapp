<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro Tarot Oracle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* (Твои стили остаются здесь) */
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .gold-btn { background: #D4AF37; padding: 15px 30px; border-radius: 20px; border: none; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1 id="title">Astro Tarot</h1>
    <div id="game-zone">
        <button class="gold-btn" onclick="sendDataToN8N()">Получить Звёздный Паспорт</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 8 языков из твоего workflow
        const locales = {
            ru: { title: "Astro Tarot Oracle", btn: "Получить Звёздный Паспорт" },
            en: { title: "Astro Tarot Oracle", btn: "Get Star Passport" },
            tr: { title: "Astro Tarot Oracle", btn: "Yıldız Pasaportunu Al" },
            es: { title: "Astro Tarot Oracle", btn: "Obtener Pasaporte Estelar" },
            pt: { title: "Astro Tarot Oracle", btn: "Obter Passaporte Estelar" },
            id: { title: "Astro Tarot Oracle", btn: "Dapatkan Paspor Bintang" },
            hi: { title: "Astro Tarot Oracle", btn: "स्टार पासपोर्ट प्राप्त करें" },
            ar: { title: "Astro Tarot Oracle", btn: "احصل على جواز السفر النجمي" }
        };

        // Берем язык из URL, который пришлет бот (например, ?lang=en)
        const params = new URLSearchParams(window.location.search);
        const langCode = params.get('lang') || 'ru';
        const lang = locales[langCode] || locales['ru'];

        document.getElementById('title').innerText = lang.title;
        document.querySelector('.gold-btn').innerText = lang.btn;

        // ЭТА ФУНКЦИЯ ШЛЕТ ДАННЫЕ В ТВОЙ N8N
        function sendDataToN8N() {
            const payload = {
                action: "generate_pdf",
                lang: langCode,
                user_id: tg.initDataUnsafe?.user?.id,
                cards: [1, 5, 12] // Твои выбранные карты
            };
            
            tg.sendData(JSON.stringify(payload));
            tg.close(); // Закрываем Mini App
        }
    </script>
</body>
</html>
