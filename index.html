<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro Tarot Oracle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* (Твои стили остаются здесь) */
        body {
            background: radial-gradient(circle, #16161a 0%, #0b0b0d 100%);
            color: #f4f4f6;
            font-family: 'Cinzel', 'Playfair Display', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0px 4px 20px rgba(212, 175, 55, 0.15);
        }

        .gold-btn {
            background: linear-gradient(135deg, #ffe58f 0%, #d4af37 50%, #aa7c11 100%);
            color: #0b0b0d;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid #ffe58f;
            border-radius: 30px;
            padding: 16px 36px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: all 0.4s ease;
            animation: pulseGlow 2.5s infinite ease-in-out;
            outline: none;
        }

        .gold-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            background: linear-gradient(135deg, #fff 0%, #d4af37 50%, #aa7c11 100%);
        }

        .gold-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            }
            50% {
                box-shadow: 0 0 25px rgba(212, 175, 55, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            }
            100% {
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            }
        }
    </style>
</head>
<body>
    <h1 id="title">Astro Tarot</h1>
    <div id="game-zone">
        <button class="gold-btn" onclick="sendDataToN8N()">Запустить Астро Таро Оракул</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 8 языков из твоего workflow
       const locales = {
    ru: { title: "Astro Tarot Oracle", btn: "Запустить Астро Таро Оракул" },
    en: { title: "Astro Tarot Oracle", btn: "Launch Astro Tarot Oracle" },
    tr: { title: "Astro Tarot Oracle", btn: "Astro Tarot Oracle'ı Başlat" },
    es: { title: "Astro Tarot Oracle", btn: "Iniciar Astro Tarot Oracle" },
    pt: { title: "Astro Tarot Oracle", btn: "Iniciar Astro Tarot Oracle" },
    id: { title: "Astro Tarot Oracle", btn: "Luncurkan Astro Tarot Oracle" },
    hi: { title: "Astro Tarot Oracle", btn: "एस्ट्रो टैरो ओरेकल लॉन्च करें" },
    ar: { title: "Astro Tarot Oracle", btn: "تشغيل أسترو تاروت أوراكل" }
};

        // Берем язык из URL, который пришлет бот (например, ?lang=en)
        const params = new URLSearchParams(window.location.search);
        const langCode = params.get('lang') || 'ru';
        const lang = locales[langCode] || locales['ru'];

        document.getElementById('title').innerText = lang.title;
        document.querySelector('.gold-btn').innerText = lang.btn;

        // ЭТА ФУНКЦИЯ ШЛЕТ ДАННЫЕ В ТВОЙ N8N
        function sendDataToN8N() {
            const payload = {
                action: "generate_pdf",
                lang: langCode,
                user_id: tg.initDataUnsafe?.user?.id,
                cards: [1, 5, 12] // Твои выбранные карты
            };
            
            tg.sendData(JSON.stringify(payload));
            tg.close(); // Закрываем Mini App
        }
    </script>
</body>
</html>
