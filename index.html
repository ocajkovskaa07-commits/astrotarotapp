<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro Tarot Oracle</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://telegram.org"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #050508;
            color: #f4f4f6;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            padding: 30px 20px;
            overflow: hidden;
            position: relative;
        }

        #space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content-wrap {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 10%, #f3e5ab 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0 30px 0;
            text-align: center;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .magic-zone {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 340px;
            height: 340px;
            margin: auto;
        }

        .wheel-fortune {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="%23d4af37" stroke-width="1" opacity="0.4"/><circle cx="100" cy="100" r="75" fill="none" stroke="%23d4af37" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.6"/><path d="M100,5 L100,195 M5,100 L195,100 M32.8,32.8 L167.2,167.2 M32.8,167.2 L167.2,32.8" stroke="%23d4af37" stroke-width="0.5" opacity="0.25"/></svg>');
            border: 2px solid rgba(212, 175, 55, 0.45);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), inset 0 0 30px rgba(212, 175, 55, 0.15);
            animation: spin 90s linear infinite;
        }

        .wheel-fortune::before {
            content: '♈ ♉ ♊ ♋ ♌ ♍ ♎ ♏ ♐ ♑ ♒ ♓';
            position: absolute;
            width: 100%;
            height: 100%;
            color: #f3e5ab;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 11px;
            padding-left: 11px;
            opacity: 0.7;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cards-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 240px;
            z-index: 3;
        }

        .tarot-card {
            position: absolute;
            width: 110px;
            height: 190px;
            background: linear-gradient(145deg, #12121a, #1a1a26);
            border: 2px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 15px rgba(212,175,55,0.2);
            overflow: hidden;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        .tarot-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 200%; height: 200%;
            background: linear-gradient(115deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0) 40%, 
                rgba(212,175,55,0.25) 48%, 
                rgba(255,255,255,0.5) 50%, 
                rgba(212,175,55,0.25) 52%, 
                rgba(255,255,255,0) 60%, 
                rgba(255,255,255,0) 100%
            );
            mix-blend-mode: overlay;
            animation: shimmer 6s infinite linear;
        }

        .card-back {
            width: 100%;
            height: 100%;
            padding: 6px;
        }
        .card-inner-border {
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" viewBox="0 0 60 60"><polygon points="30,5 55,30 30,55 5,30" fill="none" stroke="%23d4af37" stroke-width="0.5" opacity="0.3"/><circle cx="30" cy="30" r="8" fill="none" stroke="%23d4af37" stroke-width="0.5" opacity="0.5"/></svg>') center/cover;
        }
        .card-inner-border::before {
            content: '✦';
            color: #d4af37;
            font-size: 20px;
            text-shadow: 0 0 10px #d4af37;
        }

        .card-1 { transform: translateX(-45px) rotate(-12deg); }
        .card-2 { transform: translateY(-5px) scale(1.03); z-index: 4; }
        .card-3 { transform: translateX(45px) rotate(12deg); }

        @keyframes shimmer {
            0% { transform: translate(-30%, -30%) rotate(0deg); }
            100% { transform: translate(15%, 15%) rotate(0deg); }
        }

        .btn-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .gold-btn {
            position: relative;
            background: linear-gradient(135deg, #ffe58f 0%, #d4af37 40%, #aa7c11 100%);
            color: #0b0b0d;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            border-radius: 40px;
            padding: 18px 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            outline: none;
            overflow: hidden;
            animation: pulseGlow 2s infinite ease-in-out;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gold-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 40px;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6);
            transition: all 0.3s;
            animation: wavePulse 2s infinite ease-in-out;
        }

        .gold-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.8);
        }

        .gold-btn:active {
            transform: scale(0.97);
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 35px rgba(212, 175, 55, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        }

        @keyframes wavePulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); opacity: 1; }
            100% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="space-bg"></canvas>

    <div class="content-wrap">
        <h1 id="title">Astro Tarot</h1>

        <div class="magic-zone">
            <div class="wheel-fortune"></div>
            <div class="cards-container">
                <div class="tarot-card card-1"><div class="card-back"><div class="card-inner-border"></div></div></div>
                <div class="tarot-card card-2"><div class="card-back"><div class="card-inner-border"></div></div></div>
                <div class="tarot-card card-3"><div class="card-back"><div class="card-inner-border"></div></div></div>
            </div>
        </div>

        <div class="btn-container">
            <button class="gold-btn" onmousedown="createSparks(event)" ontouchstart="createSparks(event)" onclick="handleButtonClick()">Запустить Астро Таро Оракул</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const locales = {
            ru: { title: "Astro Tarot Oracle", btn: "Запустить Астро Таро Оракул" },
            en: { title: "Astro Tarot Oracle", btn: "Launch Astro Tarot Oracle" },
            tr: { title: "Astro Tarot Oracle", btn: "Astro Tarot Oracle'ı Başlat" },
            es: { title: "Astro Tarot Oracle", btn: "Iniciar Astro Tarot Oracle" },
            pt: { title: "Astro Tarot Oracle", btn: "Iniciar Astro Tarot Oracle" },
            id: { title: "Astro Tarot Oracle", btn: "Luncurkan Astro Tarot Oracle" },
            hi: { title: "Astro Tarot Oracle", btn: "एस्ट्रो टैро ओреकल लॉन्च करें" },
            ar: { title: "Astro Tarot Oracle", btn: "تشغيل أسترو تاروت أوراكل" }
        };

        const params = new URLSearchParams(window.location.search);
        const langCode = params.get('lang') || 'ru';
        const lang = locales[langCode] || locales['ru'];

        document.getElementById('title').innerText = lang.title;
        document.querySelector('.gold-btn').innerText = lang.btn;

        function handleButtonClick() {
            setTimeout(() => {
                const payload = {
                    action: "generate_pdf",
                    lang: langCode,
                    user_id: tg.initDataUnsafe?.user?.id,
                    cards: [1, 5, 12]
                };
                tg.sendData(JSON.stringify(payload));
                tg.close();
            }, 600); 
        }

        // --- ДВИЖОК КОСМОСА, ИСКР И ВИБРАЦИИ ---
        const canvas = document.getElementById('space-bg');
        const ctx = canvas.getContext('2d');

        let stars = [];
        let sparks = [];
        const numStars = 90;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    twinkleSpeed: 0.01 + Math.random() * 0.03,
                    phase: Math.random() * Math.PI,
                    speedX: (Math.random() - 0.5) * 0.05,
                    speedY: Math.random() * 0.08 + 0.02 
                });
            }
        }

        function createSparks(e) {
            // ТРИГГЕР ДЛЯ ВИБРАЦИИ TELEGRAM (Успешное действие / Двойной мягкий клик)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!clientX || !clientY) return;

            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 2;
                
                sparks.push({
                    x: clientX,
                    y: clientY,
                    size: Math.random() * 2.5 + 1,
                    speedX: Math.cos(angle) * speed,
                    speedY: Math.sin(angle) * speed - 1,
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.015,
                    color: Math.random() > 0.4 ? '#ffe58f' : '#d4af37'
                });
            }
        }

        function drawSpace() {
            let bgGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, canvas.height);
            bgGrad.addColorStop(0, '#0c0c14');
            bgGrad.addColorStop(1, '#040406');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.y += s.speedY;
                s.x += s.speedX;
                if (s.y > canvas.height) s.y = 0;
                if (s.x > canvas.width) s.x = 0;
                if (s.x < 0) s.x = canvas.width;

                s.phase += s.twinkleSpeed;
                let alpha = 0.3 + (Math.sin(s.phase) + 1) * 0.35;

                ctx.fillStyle = `rgba(243, 229, 171, ${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();

                if(s.size > 1.4) {
                    ctx.fillStyle = `rgba(212, 175, 55, ${alpha * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.strokeStyle = 'rgba(212, 175, 55, 0.04)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    let dist = Math.hypot(stars[i].x - stars[j].x, stars[i].y - stars[j].y);
                    if (dist < 65) {
                        ctx.beginPath();
                        ctx.moveTo(stars[i].x, stars[i].y);
                        ctx.lineTo(stars[j].x, stars[j].y);
                        ctx.stroke();
                    }
                }
            }

            for (let i = sparks.length - 1; i >= 0; i--) {
                let p = sparks[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += 0.05;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    sparks.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            requestAnimationFrame(drawSpace);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawSpace();
    </script>
</body>
</html>
