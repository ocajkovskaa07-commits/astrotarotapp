        /* (твой стиль оставлен без изменений) */
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            background: #030306; color: #f4f4f6; font-family: 'Cinzel', serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; padding: 15px; overflow-x: hidden; position: relative;
        }
        #space-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .content-wrap { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100%; }

        h1 {
            font-size: 24px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            background: linear-gradient(135deg, #fff 10%, #fff2b2 50%, #ffbb00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0 15px 0; text-align: center; text-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }

        .magic-zone {
            position: relative; display: flex; justify-content: center; align-items: center;
            width: 100%; max-width: 320px; height: 320px; margin: 20px auto;
            transition: transform 0.5s ease, margin 0.5s ease, height 0.5s ease;
        }
        .magic-zone.minimized {
            transform: scale(0.65) translateY(-30px);
            margin: 0 auto; height: 190px;
        }

        .wheel-fortune {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="none" stroke="%23ffd700" stroke-width="1.5" opacity="0.8"/><circle cx="100" cy="100" r="75" fill="none" stroke="%23ffd700" stroke-width="1.0" stroke-dasharray="3,2" opacity="0.9"/><path d="M100,5 L100,195 M5,100 L195,100 M32.8,32.8 L167.2,167.2 M32.8,167.2 L167.2,32.8" stroke="%23ffd700" stroke-width="0.6" opacity="0.5"/></svg>');
            border: 2.5px solid #ffd700;
            filter: drop-shadow(0 0 18px rgba(255, 215, 0, 0.6));
            animation: spin 80s linear infinite;
        }
        .wheel-fortune::before {
            content: '♈ ♉ ♊ ♋ ♌ ♍ ♎ ♏ ♐ ♑ ♒ ♓';
            position: absolute; width: 100%; height: 100%; color: #fff2b2; font-size: 17px;
            font-weight: bold; display: flex; align-items: center; justify-content: center;
            letter-spacing: 12px; padding-left: 12px;
            text-shadow: 0 0 12px #ffbb00, 0 0 25px #ffd700, 0 0 35px #ffaa00;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cards-container { 
            position: relative; width: 310px; height: 230px; display: flex; justify-content: center; align-items: center; z-index: 5; 
        }

        .interactive-card {
            position: absolute; width: 88px; height: 148px; cursor: pointer;
            perspective: 1200px; transition: all 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .interactive-card .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card.flipped .card-inner { transform: rotateY(180deg); }
        .interactive-card.inverted .card-inner { transform: rotateY(180deg) rotateZ(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border: 2px solid #ffd700; border-radius: 10px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 25px rgba(255,215,0,0.5);
        }
        .card-back { background: linear-gradient(135deg, #0f1126, #1b1f4d); }
        .card-back::before {
            content: "✦ ZLATA TAROT ✦"; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #ffd700; font-size: 13px; letter-spacing: 2px;
        }

        .card-front {
            background: #f8f0d8; transform: rotateY(180deg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 6px; text-align: center; color: #2c1a0f; font-size: 10.5px;
        }
        .card-front img { width: 68px; height: 96px; object-fit: contain; border-radius: 5px; margin-bottom: 5px; }

        .gold-btn {
            position: relative; background: linear-gradient(135deg, #fff4cc 0%, #ffd700 50%, #cc9900 100%);
            color: #050508; font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            border: none; border-radius: 40px; padding: 18px 45px; cursor: pointer; margin-top: 25px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); animation: pulseGlow 2s infinite ease-in-out;
        }
        @keyframes pulseGlow { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        #status-text { display: none; font-size: 15px; color: #fff2b2; text-align: center; margin: 15px 0; text-shadow: 0 0 8px #ffbb00; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 360px; }
        .full-width { grid-column: span 2; }
        .menu-item {
            background: rgba(22, 24, 46, 0.75); border: 1.5px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px; padding: 13px 15px; font-size: 12px;

        }
        .menu-item:hover { border-color: #ffd700; background: rgba(255, 215, 0, 0.15); transform: translateY(-2px); }

        .back-btn {
            background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff2b2;
            padding: 10px 20px; border-radius: 20px; font-size: 11px; cursor: pointer; margin-top: 20px;
        }
    </style>

            "https://i.ibb.co/0p5BPLxz/0603170325589-73-a9ea25216d7a372f63b4177ff76f5bd6.jpg",
            "https://i.ibb.co/d0bRBPnb/0603170325589-74-c76f6b123224075336f2b372196eef4f.jpg",
            "https://i.ibb.co/Q7pSsyNJ/0603170325589-75-0f41f086308b4227c36d4e34a300336c.jpg",
            "https://i.ibb.co/5gKJjbtp/0603170325589-76-9f2041a8543dce108b46a9f2a2ced143.jpg",
            "https://i.ibb.co/9khYwVGQ/0603170325589-77-e264de9d0c24d5e1d6ea510e00a4305b.jpg",
            "https://i.ibb.co/DD5GfWfM/0603170325589-78-f75e6d6ed0aa6c6290e1e87eb205ab34.jpg"
        ];

        minorNames.forEach((name, index) => {
            tarotDeck.push({
                id: 22 + index,
                name: name,
                img: minorImages[index],
                upright: "Практическая энергия. Действие, развитие, повседневные дела.",
                reversed: "Задержки, препятствия, необходимость пересмотра."
            });
        });

        // ===================== ОСНОВНЫЕ ФУНКЦИИ =====================
        function enterToApp() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('magic-zone').classList.add('minimized');
            document.getElementById('menu-stage').style.display = 'flex';
        }

        function startLayout(actionName, cardsCount) {
            currentAction = actionName;
            targetCardsCount = cardsCount;
            flippedCount = 0;
            selectedCards = [];

            document.getElementById('menu-stage').style.display = 'none';
            document.getElementById('magic-zone').classList.remove('minimized');
            document.getElementById('game-stage').style.display = 'flex';
            document.getElementById('status-text').style.display = 'block';
            document.getElementById('status-text').innerText = `Выберите ${cardsCount} карт...`;

            buildDeck(cardsCount);
        }

        function buildDeck(count) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            for (let i = 0; i < 28; i++) {
                const cardData = tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
                const card = document.createElement('div');
                card.className = 'interactive-card';
                card.dataset.info = JSON.stringify(cardData);

                let offset = (i - 14) * 11;
                let rotate = (i - 14) * 4;
                card.style.transform = `translateX(${offset}px) rotate(${rotate}deg)`;
                card.style.zIndex = 10 + i;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <img src="${cardData.img}" alt="${cardData.name}">
                            <div>${cardData.name}</div>
                        </div>
                    </div>`;

                card.addEventListener('click', () => flipCard(card));
                container.appendChild(card);
            }
        }

        function flipCard(card) {
            if (card.classList.contains('flipped')) return;
            const cardData = JSON.parse(card.dataset.info);
            const isReversed = Math.random() > 0.5;

            if (isReversed) card.classList.add('inverted');
            card.classList.add('flipped');
            card.style.transform += ' translateY(-28px) scale(1.1)';

            flippedCount++;
            selectedCards.push({...cardData, reversed: isReversed});

            if (flippedCount === targetCardsCount) {
                document.getElementById('status-text').innerText = "Формируем предсказание...";
                setTimeout(showMeanings, 1300);
            }
        }

        function showMeanings() {
            const container = document.getElementById('meanings');
            container.innerHTML = `<h3 style="color:#ffd700;text-align:center;">✦ Толкование расклада ✦</h3>`;
            selectedCards.forEach((c, i) => {
                const div = document.createElement('div');
                div.style.cssText = 'background:rgba(30,25,50,0.95);border:1px solid #d4af37;border-radius:12px;padding:14px;margin:10px 0;';
                div.innerHTML = `<strong>${i+1}. ${c.name} ${c.reversed ? '(Перевёрнутая)' : ''}</strong><br>${c.reversed ? c.reversed : c.upright}`;
                container.appendChild(div);
            });
            container.style.display = 'block';
        }

        function backToMenu() {
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('meanings').style.display = 'none';
            document.getElementById('magic-zone').classList.add('minimized');
            document.getElementById('menu-stage').style.display = 'flex';
        }

        window.onload = backToMenu;
    </script>
</body>
